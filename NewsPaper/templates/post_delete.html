{% extends 'flatpages/default.html' %}

{% block title %}Удаление поста{% endblock %}

{% block content %}
<h1>Удаление поста: {{ object.name }}</h1>
<p>Вы уверены, что хотите удалить этот пост?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'post_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
